<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0088cc"/>
      <stop offset="100%" style="stop-color:#006699"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a080"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#ocean)" stroke="#00d4aa" stroke-width="1.5"/>
  <!-- Multiplication symbol -->
  <g stroke="url(#teal)" stroke-width="3.5" stroke-linecap="round">
    <line x1="10" y1="10" x2="22" y2="22"/>
    <line x1="22" y1="10" x2="10" y2="22"/>
  </g>
  <!-- Wave accent at bottom -->
  <path d="M6 22 Q10 20 14 22 T22 22 T26 22" fill="none" stroke="#40e0d0" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
